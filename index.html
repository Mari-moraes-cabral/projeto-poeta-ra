<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Projeto RA - Poeta Carpinteiro</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.loaders.min.js"></script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.90;">
      
      <a-assets>
        <a-asset-item id="chapeu" src="chapeu_3d.glb"></a-asset-item>
      </a-assets>

      <a-marker type="pattern" url="pattern-poeta.patt">
        
        <a-entity 
          gltf-model="#chapeu" 
          scale="0.5 0.5 0.5" 
          position="0 0.5 0" 
          rotation="0 0 0"
          meshoptimizer-loader
          draco-loader="decodeConfig: {  }"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 8000">
        </a-entity>
        
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
